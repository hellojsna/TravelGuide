<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        @import url("resources/css/main.css"); /* 공통 스타일 */
        @import url("resources/css/signup.css"); /* signup.html 스타일 */
    </style>
</head>

<body>
    <header>
        <div class="headerTop">
            <a href="index.html">
                <h1>여행지 추천</h1>
            </a>
            <input type="text" placeholder="여행지를 검색해보세요!" />
            <div id="authLinkContainer">
                <a href="signin.html">로그인</a>
                <a href="signup.html">회원가입</a>
            </div>
        </div>
        <div class="headerBottom">
            <a href="#">모든 여행지</a>
            <a href="#">테마별 추천</a>
            <a href="#">인기 여행지</a>
            <a href="#">새 여행지 등록</a>
        </div>
    </header>
    <main>
        <form action="#" method="post">
            <h1>회원가입</h1>
            <p class="requiredHint">필수입력사항</p>
            <hr>
            <div class="formItem required"><!-- 아이디 입력 (input type=text) -->
                <span class="itemLabel">아이디</span>
                <span class="formInput">
                    <input type="text" id="userID" name="userID" placeholder="아이디를 입력해주세요" required>
                </span>
            </div>
            <div class="formItem required"><!-- 비밀번호 입력 (input type=text) -->
                <span class="itemLabel">비밀번호</span>
                <span class="formInput">
                    <input type="text" id="userPW" name="userPW" placeholder="비밀번호를 입력해주세요" required>
                </span>
            </div>
            <div class="formItem required"><!-- 비밀번호 확인 입력 (input type=text) -->
                <span class="itemLabel">비밀번호확인</span>
                <span class="formInput">
                    <input type="text" id="userPWCheck" name="userPWCheck" placeholder="비밀번호를 한번 더 입력해주세요" required>
                </span>
            </div>
            <div class="formItem required"><!-- 이름 입력 (input type=text) -->
                <span class="itemLabel">이름</span>
                <span class="formInput">
                    <input type="text" id="userName" name="userName" placeholder="이름을 입력해 주세요" required>
                </span>
            </div>
            <div class="formItem required"><!-- 이메일 입력 (input type=text 및 input type=select) -->
                <span class="itemLabel">이메일</span>
                <span class="formInput">
                    <input type="text" id="userEmail" name="userEmail" placeholder="예: gildong" required>
                    @
                    <div>
                        <input type="text" id="userEmailDomain" name="userEmailDomain" placeholder="직접 입력" required>
                        <!-- 스크립트 활용: "직접 입력" 선택 시 text 입력 요소의 zIndex 앞으로 당겨와서 표시-->
                        <select id="userEmailDomainSelect" name="userEmailDomainSelect" required>
                            <option value="" disabled selected hidden>선택하기</option>
                            <option value="naver.com">naver.com</option>
                            <option value="gmail.com">gmail.com</option>
                            <option value="hanmail.net">hanmail.net</option>
                            <option value="kakao.com">kakao.com</option>
                            <option value="daum.net">daum.net</option>
                            <option value="hotmail.com">hotmail.com</option>
                            <option value="yahoo.co.kr">yahoo.co.kr</option>
                            <option value="MANUAL">직접 입력</option>
                        </select>
                    </div>
                </span>
            </div>
            <div class="formItem required"><!-- 휴대폰 번호 입력 (input type=tel, 스크립트로 숫자 입력 제어)-->
                <span class="itemLabel">휴대폰</span>
                <span class="formInput">
                    <input type="tel" id="userPhone" name="userPhone" placeholder="숫자만 입력해주세요" required>
                </span>
                <button type="button" id="userPhoneAuthButton" disabled>인증번호 받기</button>
            </div>
            <div class="formItem required"><!-- 주소 입력 버튼 (팝업창 이미지로 재현) -->
                <span class="itemLabel">주소</span>
                <span class="formInput">
                    <div>
                        <input type="text" id="userAddressLine1" name="userAddressLine1" placeholder="주소를 검색해 주세요"
                            required>
                        <button type="button" id="userAddressSearchButton" class="inputButton">주소 검색</button>
                    </div>
                </span>
                <button type="button" id="userAddressSearchAgainButton">재검색</button>
            </div>
            <div class="formItem">
                <span class="itemLabel">성별</span><!-- 성별 라디오버튼 (input type=radio) -->
                <span class="formInput noOutline">
                    <span>
                        <input type="radio" id="userGenderM" name="userGenderM" value="M">
                        <label for="userGenderM">남자</label>
                    </span>
                    <span>
                        <input type="radio" id="userGenderF" name="userGenderF" value="F">
                        <label for="userGenderF">여자</label>
                    </span>
                    <span>
                        <input type="radio" id="userGenderN" name="userGenderN" value="N">
                        <label for="userGenderN">선택안함</label>
                    </span>
                </span>
                <button type="button" id="userAddressSearchAgainButton">재검색</button>
            </div>
            <div class="formItem"><!-- 생년월일 입력 (input type=text 3개) -->
                <span class="itemLabel">생년월일</span>
                <span class="formInput">
                    <div class="userBirthInput">
                        <input type="text" id="userBirthY" name="userBirthY" placeholder="YYYY" required>
                        /
                        <input type="text" id="userBirthM" name="userBirthM" placeholder="MM" required>
                        /
                        <input type="text" id="userBirthD" name="userBirthD" placeholder="DD" required>
                    </div>
                </span>
                <button type="button" id="userAddressSearchAgainButton">재검색</button>
            </div>
            <div class="formItem"><!-- 추천인 아이디 입력 라디오버튼 (input type=radio) -->
                <span class="itemLabel">추가입력사항</span>
                <span class="formInput noOutline">
                    <span>
                        <input type="radio" id="userReferral" name="userReferral" value="N">
                        <label for="userReferral">친구초대 추천인 아이디</label>
                    </span>
                </span>
            </div>
            <hr>
            <!--약관 동의-->
            <div class="formItem">
                <span class="itemLabel">이용약관동의</span>
                <div>
                    <input type="checkbox" id="termsAll" name="termsAll" value="Y">
                    <label for="termsAll" style="font-size: 1.5rem;">전체 동의합니다.</label>
                    <p>선택항목에 동의하지 않은 경우도 회원가입 및 일반적인 서비스를 이용할 수 있습니다.</p>
                    <div>
                        <input type="checkbox" id="termsService" name="termsService" value="Y" required>
                        <label for="termsService">이용약관 동의 (필수)</label>
                    </div>
                    <div>
                        <input type="checkbox" id="termsPrivacy" name="termsPrivacy" value="Y" required>
                        <label for="termsPrivacy">개인정보 수집·이용 동의 (필수)</label>
                    </div>
                    <div>
                        <input type="checkbox" id="termsMarketing" name="termsMarketing" value="Y">
                        <label for="termsMarketing">마케팅 광고 활용을 위한 수집 및 이용 동의 (선택)</label>
                    </div>
                    <div>
                        <input type="checkbox" id="termsBenefit" name="termsBenefit" value="Y">
                        <label for="termsBenefit">무료배송, 할인혜택 등 혜택/정보 수신 동의 (선택)</label>
                        <div>
                            <input type="checkbox" id="termsBenefitSMS" name="termsBenefitSMS" value="Y">
                            <label for="termsBenefitSMS">SMS</label>
                            <input type="checkbox" id="termsBenefitEmail" name="termsBenefitEmail" value="Y">
                            <label for="termsBenefitEmail">이메일</label>
                        </div>
                    </div>
                    <div>
                        <input type="checkbox" id="termsAge" name="termsAge" value="Y" required>
                        <label for="termsAge">본인은 만 14세 이상입니다. (필수)</label>
                    </div>
                </div>
            </div>
            <input type="submit" value="가입하기" id="registerSubmitButton">
        </form>
    </main>
    <footer>
        <p>여행지 추천 <a href="#">이용약관</a> <a href="#">개인정보처리방침</a> <a href="#">고객센터</a></p>
        <p>Copyright © 2026 Js Na. All rights reserved.</p>
    </footer>
    <script>
        /// form
        var userEmailDomain = document.getElementById("userEmailDomain"); // 이메일 도메인 입력 input
        var userEmailDomainSelect = document.getElementById("userEmailDomainSelect"); // 이메일 도메인 선택
        userEmailDomainSelect.addEventListener("change", () => {
            const selectedDomain = userEmailDomainSelect.value;
            console.log(selectedDomain);
            if (selectedDomain == "MANUAL") { // 직접 입력
                userEmailDomain.style.display = "inline";
                userEmailDomain.value = "";
            } else { // 목록에서 선택
                userEmailDomain.style.display = "none";
                userEmailDomain.value = selectedDomain;
            }
        });

        var userPhone = document.getElementById("userPhone"); // 전화번호 input
        var userPhoneAuthButton = document.getElementById("userPhoneAuthButton"); // 인증번호 받기 버튼
        userPhone.addEventListener("input", () => {
            const numberInput = userPhone.value;
            console.log(numberInput);
            userPhone.value = numberInput.replaceAll(/\D/g, '');
            if (numberInput.length > 0) {
                userPhoneAuthButton.disabled = false;
            } else {
                userPhoneAuthButton.disabled = true;
            }
        })
        userPhoneAuthButton.addEventListener("click", () => { // 인증번호 발송 버튼 클릭 시 알림 표시
            alert("인증번호가 발송되었습니다.");
            // 실제 발송 로직 미구현
        })

        var userAddressLine1 = document.getElementById("userAddressLine1");
        var userAddressSearchButton = document.getElementById("userAddressSearchButton");
